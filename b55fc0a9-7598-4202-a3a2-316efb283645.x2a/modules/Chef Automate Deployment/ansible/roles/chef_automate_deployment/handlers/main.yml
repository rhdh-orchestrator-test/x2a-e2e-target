---
- name: Restart Chef Automate
  ansible.builtin.command:
    cmd: chef-automate restart
  become: true
  listen: restart chef-automate
  changed_when: true
- name: Restart Chef Infra Server
  ansible.builtin.command:
    cmd: chef-server-ctl restart
  become: true
  listen: restart chef-server
  changed_when: true
